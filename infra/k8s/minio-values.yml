mode: standalone
replicas: 1

existingSecret: minio-credentials

persistence:
  enabled: true
  size: 5Gi

buckets:
  - name: starter-codes
    policy: none
    purge: false

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

environment:
  MINIO_CORS_ALLOW_ORIGIN: "https://tryleopard.dev,https://*.tryleopard.dev,http://localhost:3000"

ingress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - minio.tryleopard.dev
  tls:
    - secretName: minio-tls
      hosts:
        - minio.tryleopard.dev

consoleIngress:
  enabled: true
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
  hosts:
    - minio-console.tryleopard.dev
  tls:
    - secretName: minio-console-tls
      hosts:
        - minio-console.tryleopard.dev
